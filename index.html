<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-Style | AI Virtual Try-On</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a855f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #ai-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; color: var(--text-main); gap: 1rem;
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(0,0,0,0.1);
            border-left-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- AI Loading Overlay -->
    <div id="ai-loader">
        <div class="spinner"></div>
        <h2 style="font-family: 'Outfit'; letter-spacing: 1px; font-weight: 700;">AI 생성 중...</h2>
        <p style="color: var(--text-secondary); font-weight: 400; text-align: center;">
            진짜 입은 것처럼 새롭게 이미지를 그리고 있습니다.<br>
            <span style="font-size: 0.8rem;">(최대 1~2분 정도 소요될 수 있습니다)</span>
        </p>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">SA-STYLE</div>
        
        <div class="scroll-area">
            <section>
                <h3 class="section-title">Step 1. Upload Photo</h3>
                <div class="upload-group" style="display: flex; gap: 0.5rem; margin-bottom: 2rem;">
                    <button class="btn-upload" style="flex: 1;" onclick="document.getElementById('bg-upload').click()">
                        <i data-lucide="image"></i> Album
                    </button>
                    <button class="btn-upload" style="flex: 1; background: #333;" id="camera-open-btn">
                        <i data-lucide="camera"></i> Camera
                    </button>
                    <input type="file" id="bg-upload" accept="image/*" hidden>
                </div>
            </section>

            <section>
                <h3 class="section-title">Step 2. Select Top (상의)</h3>
                <div class="item-grid" id="top-grid">
                    <div class="item-card" data-category="top" data-img="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&q=80&w=200">
                        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&q=80&w=200" alt="White T-shirt">
                    </div>
                    <div class="item-card" data-category="top" data-img="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&q=80&w=200">
                        <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&q=80&w=200" alt="Denim Jacket">
                    </div>
                </div>
                <div class="upload-group" style="display: flex; gap: 0.5rem; margin-bottom: 2rem;">
                    <button class="btn-upload" style="flex: 1; background: white; color: var(--accent); border: 1px solid #E5E5E5;" onclick="document.getElementById('top-upload').click()">
                        <i data-lucide="plus"></i> Album
                    </button>
                    <button class="btn-upload" style="flex: 1; background: #555;" class="camera-trigger" data-target="top">
                        <i data-lucide="camera"></i> Camera
                    </button>
                </div>
                <input type="file" id="top-upload" accept="image/*" hidden>
            </section>

            <section>
                <h3 class="section-title">Step 3. Select Bottom (하의)</h3>
                <div class="item-grid" id="bottom-grid">
                    <div class="item-card" data-category="bottom" data-img="https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&q=80&w=200">
                        <img src="https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&q=80&w=200" alt="Blue Jeans">
                    </div>
                    <div class="item-card" data-category="bottom" data-img="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?auto=format&fit=crop&q=80&w=200">
                        <img src="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?auto=format&fit=crop&q=80&w=200" alt="Black Slacks">
                    </div>
                </div>
                <div class="upload-group" style="display: flex; gap: 0.5rem;">
                    <button class="btn-upload" style="flex: 1; background: white; color: var(--accent); border: 1px solid #E5E5E5;" onclick="document.getElementById('bottom-upload').click()">
                        <i data-lucide="plus"></i> Album
                    </button>
                    <button class="btn-upload" style="flex: 1; background: #555;" class="camera-trigger" data-target="bottom">
                        <i data-lucide="camera"></i> Camera
                    </button>
                </div>
                <input type="file" id="bottom-upload" accept="image/*" hidden>
            </section>
            
            <section id="selection-preview" style="display: none; margin-top: 2rem; background: #f9f9f9; padding: 1.5rem; border-radius: var(--radius-md);">
                <h3 class="section-title">Selected Outfit</h3>
                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <div id="top-preview-box" style="display: none; width: 80px; height: 100px; border: 2px solid var(--accent); border-radius: 8px; overflow: hidden;">
                        <img id="top-preview-img" src="" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                    <div id="bottom-preview-box" style="display: none; width: 80px; height: 100px; border: 2px solid var(--accent); border-radius: 8px; overflow: hidden;">
                        <img id="bottom-preview-img" src="" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                </div>
            </section>
        </div>

        <!-- Footer Actions -->
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 0.8rem;">
            <button class="btn-upload" id="ai-tryon-btn" style="background: var(--accent); letter-spacing: 0.5px;">
                <i data-lucide="sparkles"></i> AI Magic Try-On
            </button>
            <button class="btn-upload" id="reset-btn" style="background: transparent; color: var(--text-secondary); padding: 0.5rem; font-size: 0.8rem;">
                Reset
            </button>
        </div>
    </aside>

    <!-- Main Workspace -->
    <main class="main-content">
        <!-- Canvas Area -->
        <div class="canvas-container" id="canvas-container">
            <!-- Original Photo & Result Photo -->
            <img id="user-photo-display" style="display: none; width: 100%; height: 100%; object-fit: contain; z-index: 1;">
            
            <!-- Empty Msg -->
            <div class="empty-state" id="empty-msg">
                <i data-lucide="camera" size="40" style="opacity: 0.2;"></i>
                <p style="font-weight: 500;">Upload your photo to start</p>
            </div>
        </div>
    </main>

    <!-- Camera Modal -->
    <div id="camera-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center;">
        <video id="camera-video" autoplay playsinline style="width: 90%; max-width: 500px; border-radius: 20px; background: black;"></video>
        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button id="camera-capture-btn" class="btn-upload" style="background: white; color: black; padding: 1rem 2rem;">
                <i data-lucide="camera"></i> Capture Photo
            </button>
            <button id="camera-close-btn" class="btn-upload" style="background: rgba(255,255,255,0.2); padding: 1rem 2rem;">
                Cancel
            </button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
