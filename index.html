<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-Style | AI Virtual Try-On</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a855f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SA-Style">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3534/3534312.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #ai-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; color: var(--text-main); gap: 1rem;
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(0,0,0,0.1);
            border-left-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- AI Loading Overlay -->
    <div id="ai-loader">
        <div class="spinner"></div>
        <h2 style="font-family: 'Outfit'; letter-spacing: 1px; font-weight: 700;">AI 생성 중...</h2>
        <p style="color: var(--text-secondary); font-weight: 400; text-align: center;">
            진짜 입은 것처럼 새롭게 이미지를 그리고 있습니다.<br>
            <span style="font-size: 0.8rem;">(최대 1~2분 정도 소요될 수 있습니다)</span>
        </p>
    </div>

    <!-- [NEW] Result Area at Top for better Mobile UX -->
    <main class="main-content">
        <div class="canvas-container" id="canvas-container">
            <img id="user-photo-display" style="display: none; width: 100%; height: 100%; object-fit: contain; z-index: 10; position: relative;">
            <div class="empty-state" id="empty-msg" style="position: absolute; z-index: 1; text-align: center;">
                <i data-lucide="camera" size="48" style="opacity: 0.2; margin-bottom: 1rem;"></i>
                <p style="font-weight: 500; color: var(--text-secondary);">Upload your photo to start</p>
            </div>
        </div>
    </main>

    <!-- Sidebar / Options -->
    <aside class="sidebar">
        <div class="logo">SA-STYLE</div>
        
        <div class="scroll-area">
            <section>
                <h3 class="section-title">Step 1. Upload Photo</h3>
                <div class="upload-group" style="display: flex; gap: 0.5rem; margin-bottom: 2rem;">
                    <button class="btn-upload" style="flex: 1;" onclick="document.getElementById('bg-upload').click()">
                        <i data-lucide="image"></i> Album
                    </button>
                    <button class="btn-upload" style="flex: 1; background: #333;" id="camera-open-btn">
                        <i data-lucide="camera"></i> Camera
                    </button>
                    <input type="file" id="bg-upload" accept="image/*" hidden>
                </div>
            </section>

            <section>
                <h3 class="section-title">Step 2. Select Top (상의)</h3>
                <div class="item-grid" id="top-grid">
                    <div class="item-card" data-category="top" data-img="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&q=80&w=200">
                        <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&q=80&w=200" alt="White Tee">
                    </div>
                    <div class="item-card" data-category="top" data-img="https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&q=80&w=200">
                        <img src="https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&q=80&w=200" alt="Black Tee">
                    </div>
                </div>
                <div class="upload-group" style="display: flex; gap: 0.5rem; margin-bottom: 2rem;">
                    <button class="btn-upload" style="flex: 1; background: white; color: var(--accent); border: 1px solid #E5E5E5;" onclick="document.getElementById('top-upload').click()">
                        <i data-lucide="plus"></i> Album
                    </button>
                    <button class="btn-upload" style="flex: 1; background: #555;" id="camera-top-btn">
                        <i data-lucide="camera"></i> Camera
                    </button>
                </div>
                <input type="file" id="top-upload" accept="image/*" hidden>
            </section>

            <section>
                <h3 class="section-title">Step 3. Select Bottom (하의)</h3>
                <div class="item-grid" id="bottom-grid">
                    <div class="item-card" data-category="bottom" data-img="https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&q=80&w=200">
                        <img src="https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&q=80&w=200" alt="Blue Jeans">
                    </div>
                    <div class="item-card" data-category="bottom" data-img="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?auto=format&fit=crop&q=80&w=200">
                        <img src="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?auto=format&fit=crop&q=80&w=200" alt="Black Slacks">
                    </div>
                </div>
                <div class="upload-group" style="display: flex; gap: 0.5rem;">
                    <button class="btn-upload" style="flex: 1; background: white; color: var(--accent); border: 1px solid #E5E5E5;" onclick="document.getElementById('bottom-upload').click()">
                        <i data-lucide="plus"></i> Album
                    </button>
                    <button class="btn-upload" style="flex: 1; background: #555;" id="camera-bottom-btn">
                        <i data-lucide="camera"></i> Camera
                    </button>
                </div>
                <input type="file" id="bottom-upload" accept="image/*" hidden>
            </section>

            <!-- Selected Summary -->
            <div id="selection-preview" style="display: none; margin-top: 2rem; padding: 1.5rem; background: rgba(0,0,0,0.03); border-radius: 15px;">
                <h4 style="margin-bottom: 1rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">Selected Outfit</h4>
                <div style="display: flex; gap: 1rem;">
                    <div id="top-preview-box" style="display: none; width: 60px; height: 60px; border-radius: 10px; overflow: hidden; border: 2px solid var(--accent);">
                        <img id="top-preview-img" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div id="bottom-preview-box" style="display: none; width: 60px; height: 60px; border-radius: 10px; overflow: hidden; border: 2px solid var(--accent);">
                        <img id="bottom-preview-img" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                </div>
            </div>
        </div>

        <!-- Prompt Input Area -->
        <div style="margin-top: 2rem; margin-bottom: 1rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.85rem; font-weight: 500;">
                <i data-lucide="wand-2" size="14"></i> Style Prompt (AI 지시어)
            </div>
            <textarea id="ai-prompt" placeholder="예: '빨간색으로 바꿔줘', '밝은 분위기로 합성해줘'" 
                style="width: 100%; height: 80px; padding: 1rem; border-radius: 12px; border: 1px solid #E5E5E5; background: #F9FAFB; font-family: inherit; font-size: 0.9rem; resize: none; outline: none; transition: border-color 0.2s;"
                onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='#E5E5E5'"></textarea>
        </div>

        <!-- Footer Actions -->
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 0.8rem;">
            <button class="btn-upload" id="ai-tryon-btn" style="background: var(--accent); letter-spacing: 0.5px;">
                <i data-lucide="sparkles"></i> AI Magic Try-On
            </button>
            <button class="btn-upload" id="reset-btn" style="background: transparent; color: var(--text-secondary); padding: 0.5rem; font-size: 0.8rem;">
                Reset
            </button>
        </div>
    </aside>

    <!-- Camera Modal -->
    <div id="camera-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center;">
        <video id="camera-video" autoplay playsinline style="width: 90%; max-width: 500px; border-radius: 20px; background: black; transform: scaleX(-1);"></video>
        <div style="margin-top: 2rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem;">
            <button id="camera-capture-btn" class="btn-upload" style="background: white; color: black; padding: 1rem 2rem; width: auto;">
                <i data-lucide="camera"></i> Capture
            </button>
            <button id="camera-flip-btn" class="btn-upload" style="background: #a855f7; padding: 1rem 1.5rem; width: auto;">
                <i data-lucide="refresh-cw"></i> Flip
            </button>
            <button id="camera-close-btn" class="btn-upload" style="background: rgba(255,255,255,0.2); padding: 1rem 1.5rem; width: auto;">
                Cancel
            </button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
